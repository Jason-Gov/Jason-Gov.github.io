<!DOCTYPE HTML>
<html>
<head>
    <title>Scratch Game | Jason Gov</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .scratch-page {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 3;
        }

        .scratch-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(27, 31, 34, 0.9);
            border: solid 1px rgba(255, 255, 255, 0.125);
            padding: 2.5rem;
        }

        .scratch-container h1 {
            margin-bottom: 1rem;
        }

        .scratch-container p {
            text-transform: none;
            letter-spacing: 0.03rem;
            line-height: 1.8;
        }

        .scratch-frame {
            width: 100%;
            margin: 2rem 0;
        }

        .scratch-frame iframe {
            width: 100%;
            height: 750px;
            border: 0;
            display: block;
            background: #fff;
        }

        .button-row {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        @media screen and (max-width: 736px) {
            .scratch-page {
                padding: 2rem 1rem;
            }

            .scratch-container {
                padding: 1.5rem;
            }

            .scratch-frame iframe {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="scratch-page">
        <div class="scratch-container">
            <h1>Scratch Maze Game</h1>
            <p>
                This is a Scratch game I created in KNES 381. I hope you enjoy it! 
            </p>

            <div class="scratch-frame">
                <iframe
                    src="https://scratch.mit.edu/projects/1282131319/embed"
                    allowtransparency="true"
                    frameborder="0"
                    scrolling="no"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="button-row">
                <a href="index.html#Projects" class="button">Back to Projects</a>
                <a href="https://scratch.mit.edu/projects/1282131319/" target="_blank" rel="noopener noreferrer" class="button primary">Open on Scratch</a>
            </div>
        </div>
    </div>

</body>
</html>
