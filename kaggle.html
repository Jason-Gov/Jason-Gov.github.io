<!DOCTYPE HTML>
<html>
<head>
    <title>Kaggle Project | Jason Gov</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .kaggle-page {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 3;
        }

        .kaggle-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(27, 31, 34, 0.9);
            border: solid 1px rgba(255, 255, 255, 0.125);
            padding: 2.5rem;
        }

        .kaggle-container h1 {
            margin-bottom: 1rem;
        }

        .kaggle-container p {
            text-transform: none;
            letter-spacing: 0.03rem;
            line-height: 1.8;
        }

        .kaggle-frame {
            width: 100%;
            margin: 2rem 0;
        }

        .kaggle-frame iframe {
            width: 100%;
            height: 800px;
            border: 0;
            display: block;
            background: #fff;
        }

        .button-row {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        @media screen and (max-width: 736px) {
            .kaggle-page {
                padding: 2rem 1rem;
            }

            .kaggle-container {
                padding: 1.5rem;
            }

            .kaggle-frame iframe {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="kaggle-page">
        <div class="kaggle-container">
            <h1>Kaggle Notebook</h1>
            <p>
                This is my Kaggle notebook project for KNES 381.
            </p>

            <div class="kaggle-frame">
                <iframe 
                    src="https://www.kaggle.com/embed/jasongov/knes381-demo2"
                    frameborder="0"
                    scrolling="auto"
                    title="KNES381 Demo 2">
                </iframe>
            </div>

            <div class="button-row">
                <a href="index.html#Projects" class="button">Back to Projects</a>
                <a href="https://www.kaggle.com/code/jasongov/knes381-demo2" target="_blank" rel="noopener noreferrer" class="button primary">Open on Kaggle</a>
            </div>
        </div>
    </div>

</body>
</html>
